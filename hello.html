<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secret Message</title>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#ffe6f0,#ffcccb);
overflow:hidden;
}

/* Page layout */

.page{
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
opacity:0;
transition:0.6s;
}

.page.active{
opacity:1;
}

/* Text */

h1,h2{
color:#ff4081;
}

/* Button */

button{
margin-top:30px;
padding:15px 40px;
font-size:20px;
border:none;
border-radius:40px;
background:#ff4081;
color:white;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

button:hover{
background:#ff2f70;
}

</style>
</head>

<body>

<!-- Page 1 -->
<div id="page1" class="page active">
<h2>This is from Suzaina</h2>
<button onclick="nextPage()">Click Me</button>
</div>

<!-- Page 2 -->
<div id="page2" class="page">
<h1>Hello cutie!! Get well soon 💖</h1>
</div>

<script>

function nextPage(){
document.getElementById("page1").classList.remove("active");
document.getElementById("page2").classList.add("active");
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Secret Message</title>
<style>
body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background: linear-gradient(135deg, #ffe6f0 0%, #ffcccb 100%);
  font-family: 'Arial', sans-serif;
  margin:0;
  overflow:hidden;
}

h1{
  font-size:60px;
  color:#ff4081;
  text-align:center;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
  animation: pulse 2s infinite;
  margin:0;
  position:relative;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

/* Floating hearts */
body::before {
  content: '💖 💕 💗 💖';
  position: absolute;
  top: 20%;
  left: 10%;
  font-size: 30px;
  animation: float 6s infinite linear;
}

body::after {
  content: '💕 💗 💖 💕';
  position: absolute;
  bottom: 20%;
  right: 10%;
  font-size: 30px;
  animation: float 8s infinite linear reverse;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-20px); }
  100% { transform: translateY(0px); }
}

/* Responsive */
@media (max-width: 768px) {
  h1 { font-size: 40px; }
}
</style>
</head>

<body>
<h1>Hello cutie 💖 get well soon</h1>
</body>
</html>
